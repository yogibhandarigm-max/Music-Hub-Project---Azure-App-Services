name: CD

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZURE_APP_NAME: ${{ secrets.AZURE_APP_NAME }}
      AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Azure credentials JSON from client secret
        if: ${{ env.AZURE_CREDENTIALS == '' && env.AZURE_CLIENT_SECRET != '' }}
        run: |
          python3 - <<'PY'
          import json, os

          payload = {
              "clientId": os.environ["AZURE_CLIENT_ID"],
              "clientSecret": os.environ["AZURE_CLIENT_SECRET"],
              "subscriptionId": os.environ["AZURE_SUBSCRIPTION_ID"],
              "tenantId": os.environ["AZURE_TENANT_ID"],
              "activeDirectoryEndpointUrl": "https://login.microsoftonline.com",
              "resourceManagerEndpointUrl": "https://management.azure.com/",
              "activeDirectoryGraphResourceId": "https://graph.windows.net/",
              "sqlManagementEndpointUrl": "https://management.core.windows.net:8443/",
              "galleryEndpointUrl": "https://gallery.azure.com/",
              "managementEndpointUrl": "https://management.core.windows.net/"
          }

          with open(os.environ["GITHUB_ENV"], "a") as env_file:
              env_file.write("AZURE_CREDENTIALS=" + json.dumps(payload) + "\n")
          PY
      - name: Login to Azure using service principal
        if: ${{ env.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v1
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}
      - name: Fail if no Azure credentials are available
        if: ${{ env.AZURE_CREDENTIALS == '' && env.AZURE_CLIENT_SECRET == '' }}
        run: |
          echo "AZURE_CREDENTIALS or AZURE_CLIENT_SECRET is required for deployment."
          exit 1
      - name: Build frontend package
        run: |
          zip -r swarity-frontend.zip . -x "*.git*" "*.env*" "node_modules/*" "functions/*" "infra/*" "scripts/*" "tests/*"
      - name: Deploy frontend to App Service
        run: |
          if [ -z "$AZURE_RESOURCE_GROUP" ] || [ -z "$AZURE_APP_NAME" ]; then
            echo "Missing AZURE_RESOURCE_GROUP or AZURE_APP_NAME"
            exit 1
          fi

          az webapp deployment source config-zip \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_APP_NAME" \
            --src swarity-frontend.zip
      - name: Deploy Functions app code
        run: |
          if [ -z "$AZURE_RESOURCE_GROUP" ] || [ -z "$AZURE_FUNCTIONAPP_NAME" ]; then
            echo "Missing AZURE_RESOURCE_GROUP or AZURE_FUNCTIONAPP_NAME"
            exit 1
          fi

          cd functions
          zip -r ../swarity-functions.zip . -x "node_modules/*"
          az functionapp deployment source config-zip \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --src ../swarity-functions.zip
      - name: Deploy infrastructure Bicep
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters @infra/parameters.json
