<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SoundWave</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html" class="logo" style="text-decoration: none; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-wave-square"></i> SoundWave
                </a>
            </div>
            <div style="flex: 1;"></div>
            <div class="auth-section">
                <a href="index.html" class="btn-text">Back to Home</a>
            </div>
        </div>
    </header>

    <div style="max-width: 400px; margin: 100px auto; padding: 40px; background: #282828; border-radius: 12px;">
        <h1 style="font-size: 32px; margin-bottom: 10px; text-align: center; background: linear-gradient(135deg, #1ed760 0%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome Back</h1>
        <p style="text-align: center; color: #b3b3b3; margin-bottom: 30px;">Log in to SoundWave</p>

        <form id="loginForm" style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label for="email" style="display: block; margin-bottom: 8px; font-weight: 600; color: #fff;">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="you@example.com" 
                    required
                    style="width: 100%; padding: 12px; background: #1f1f1f; border: 1px solid #404040; border-radius: 8px; color: #fff; font-size: 14px; box-sizing: border-box;"
                >
            </div>

            <div>
                <label for="password" style="display: block; margin-bottom: 8px; font-weight: 600; color: #fff;">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required
                    style="width: 100%; padding: 12px; background: #1f1f1f; border: 1px solid #404040; border-radius: 8px; color: #fff; font-size: 14px; box-sizing: border-box;"
                >
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; border: none; cursor: pointer; font-weight: 600; border-radius: 24px;">Login</button>
        </form>

        <p style="text-align: center; color: #b3b3b3; margin-top: 20px;">
            Don't have an account? <a href="signup.html" style="color: #1ed760; text-decoration: none;">Sign Up</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
